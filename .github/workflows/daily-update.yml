name: 渔业文献每周更新

on:
  schedule:
    # 每天 UTC 8:00 运行（北京时间 16:00）
    - cron: "0 8 * * *"
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "templates/**"
      - ".github/workflows/daily-update.yml"

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🔍 获取最新论文
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          CI: "true"
        run: python scripts/fetch_papers.py

      - name: 🤖 DeepSeek AI 中文总结 + 每周综述
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/summarize.py
        continue-on-error: true

      - name: 🎨 生成 HTML 站点
        run: python scripts/generate_site.py

      - name: 📤 提交并推送更新
        run: |
          git config user.name "Fishery Bot 🤖"
          git config user.email "fishery-bot@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "📰 渔业文献每周更新 - $(date +'%Y-%m-%d')"
            git push
          fi
